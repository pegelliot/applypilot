<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f8fb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ApplyPilot">
  <title>ApplyPilot</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-lockup">
        <div class="app-mark" aria-hidden="true">AP</div>
        <div>
        <p class="eyebrow">Targeted job search</p>
        <h1>ApplyPilot</h1>
        </div>
      </div>
      <button class="icon-button text-icon" id="backupButton" type="button" aria-label="Export backup" title="Export backup">Export</button>
    </header>

    <main id="app" class="app-main" aria-live="polite"></main>

    <nav class="tabbar" aria-label="Main sections">
      <button class="tab is-active" data-view="dashboard" data-icon="H" type="button"><span>Home</span></button>
      <button class="tab" data-view="jobs" data-icon="J" type="button"><span>Jobs</span></button>
      <button class="tab" data-view="contacts" data-icon="N" type="button"><span>Network</span></button>
      <button class="tab" data-view="assistant" data-icon="C" type="button"><span>Create</span></button>
      <button class="tab" data-view="interviews" data-icon="I" type="button"><span>Interviews</span></button>
      <button class="tab" data-view="settings" data-icon="M" type="button"><span>More</span></button>
    </nav>
  </div>

  <dialog id="editorDialog">
    <form method="dialog" class="dialog-card" id="editorForm">
      <div class="dialog-header">
        <h2 id="dialogTitle">Edit</h2>
        <button class="icon-button" value="cancel" type="submit" aria-label="Close">X</button>
      </div>
      <div id="dialogFields" class="dialog-fields"></div>
      <div class="dialog-actions">
        <button class="secondary-button" value="cancel" type="submit">Cancel</button>
        <button class="primary-button" id="saveDialogButton" value="default" type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <input id="importFile" type="file" accept="application/json" hidden>
  <input id="resumeFile" type="file" accept=".txt,.md,.rtf,.doc,.docx,.pdf,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" hidden>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=15" defer></script>
</body>
</html>
